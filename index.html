<html lang="en">

    <title>United States Small Cent Mintages</title>
    <style>
        /* Tech-Dark Theme Reset & Variables */
        :root {
            --bg-main: #0a0f1d;
            --bg-card: #121829;
            --bg-row-even: #161f38;
            --accent-cyan: #00f2fe;
            --accent-blue: #0072ff;
            --text-primary: #f8fafc; 
            --text-secondary: #94a3b8; 
            --border-color: #24335c;
            --text-bright: #38bdf8; 
            
            /* Token/Pill specific colors for Rarity */
            --pill-common-bg: rgba(148, 163, 184, 0.1);
            --pill-common-text: #cbd5e1;
            --pill-low-bg: rgba(56, 189, 248, 0.12);
            --pill-low-text: #38bdf8;
            --pill-semi-bg: rgba(234, 179, 8, 0.12);
            --pill-semi-text: #fde047;
            --pill-key-bg: rgba(239, 68, 68, 0.15);
            --pill-key-text: #fca5a5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        /* Header / Tech Branding */
        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .timestamp {
            font-family: monospace;
            color: var(--accent-cyan);
            font-size: 0.9rem;
            background: rgba(0, 242, 254, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        /* KPI Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--accent-cyan), var(--accent-blue));
        }

        .card-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-bright);
            font-family: monospace;
            white-space: nowrap;
        }

        .card-subtext {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* Data Section Controls */
        .table-toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 1rem;
        }

        .search-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            color: var(--text-bright);
            width: 300px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* Data Table Wrapper */
        .table-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Ensures strictly justified column balancing */
        }

        th, td {
            width: 33.33%; /* Evenly justifies column spacing across the container */
            padding: 0.85rem 1rem;
            text-align: center; /* Centers all information cleanly below headers */
            vertical-align: middle;
            white-space: nowrap;
        }

        th {
            background-color: rgba(22, 31, 56, 0.9);
            color: var(--accent-cyan);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }

        th:not(:last-child), td:not(:last-child) {
            border-right: 1px solid rgba(36, 51, 92, 0.35);
        }

        td {
            border-bottom: 1px solid rgba(36, 51, 92, 0.4);
            font-size: 0.95rem;
        }

        tr:nth-child(even) {
            background-color: var(--bg-row-even);
        }

        .year-val {
            font-weight: 600;
            color: var(--text-primary);
        }

        .mintage-val {
            font-family: monospace;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-bright);
        }

        /* Rarity Pill Tags */
        .pill {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            text-align: center;
        }

        .pill.key-date {
            background-color: var(--pill-key-bg);
            color: var(--pill-key-text);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .pill.semi-key {
            background-color: var(--pill-semi-bg);
            color: var(--pill-semi-text);
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .pill.low-mintage {
            background-color: var(--pill-low-bg);
            color: var(--pill-low-text);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .pill.common {
            background-color: var(--pill-common-bg);
            color: var(--pill-common-text);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }
    </style>
</head>

    const tbody = document.getElementById('data-rows');
    const searchInput = document.getElementById('search-input');

    // Function to calculate and render the dynamic top cards
    function calculateStats() {
        let total = 0;
        let count = 0;
        let maxMintage = -Infinity;
        let maxYear = "";
        let minMintage = Infinity;
        let minYear = "";

        dataset.forEach(entry => {
            if (entry.mintage !== null && entry.mintage !== undefined) {
                total += entry.mintage;
                count++;

                if (entry.mintage > maxMintage) {
                    maxMintage = entry.mintage;
                    maxYear = entry.year;
                }
                if (entry.mintage < minMintage) {
                    minMintage = entry.mintage;
                    minYear = entry.year;
                }
            }
        });

        const avgMintage = Math.round(total / count);

        // Update the DOM cards
        document.getElementById('stat-max').innerText = maxMintage.toLocaleString();
        document.getElementById('stat-max-year').innerText = `Year: ${maxYear}`;
        
        document.getElementById('stat-min').innerText = minMintage.toLocaleString();
        document.getElementById('stat-min-year').innerText = `Year: ${minYear}`;
        
        document.getElementById('stat-total').innerText = total.toLocaleString();
        document.getElementById('stat-avg').innerText = avgMintage.toLocaleString();
    }

    // Function to map a classification styling class to a rarity level
    function getRarityClass(rarity) {
        const lower = rarity.toLowerCase();
        if (lower.includes('key date') && !lower.includes('semi')) return 'key-date';
        if (lower.includes('semi-key')) return 'semi-key';
        if (lower.includes('low mintage')) return 'low-mintage';
        return 'common';
    }

    // Function to render rows onto the balanced datatable layout
    function displayTable(filterText = '') {
        tbody.innerHTML = '';
        const search = filterText.toLowerCase().trim();

        dataset.forEach(entry => {
            if (search !== '' && !entry.year.toLowerCase().includes(search) && !entry.rarity.toLowerCase().includes(search)) {
                return; // Filter out rows not matching query
            }

            const tr = document.createElement('tr');
            
            // Format out nulls or pending values safely
            const displayMintage = entry.mintage !== null ? entry.mintage.toLocaleString() : "N/A";
            const rarityClass = getRarityClass(entry.rarity);

            tr.innerHTML = `
                <td><div class="year-val">${entry.year}</div></td>
                <td><div class="mintage-val">${displayMintage}</div></td>
                <td><span class="pill ${rarityClass}">${entry.rarity}</span></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Setup input listeners for dynamic filtering
    searchInput.addEventListener('input', (e) => {
        displayTable(e.target.value);
    });

    // Initialize application runtime
    calculateStats();
    displayTable();
</script>
